name: Build Padavan CR660x Custom v5

on:
  workflow_dispatch:
  watch:
    types: [started]

env:
  TNAME: CR660x
  KERNEL: "3.4"

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: CRITICAL FIX - Modify config TEMPLATE (not .config!)
      run: |
        cd /opt/rt-n56u/trunk
        # ====================================================================
        # ROOT CAUSE FIX: build_firmware_modify does:
        #   cp -f configs/templates/$TNAME.config .config
        # at the very start, OVERWRITING any changes to .config!
        # All previous sed changes to .config were silently lost.
        # FIX: Modify the TEMPLATE file directly so the changes survive.
        # ====================================================================

        CONFIG_FILE="configs/templates/$TNAME.config"

        echo "============================================"
        echo "=== Original template: plugins enabled (=y) ==="
        echo "============================================"
        grep "CONFIG_FIRMWARE_INCLUDE.*=y" $CONFIG_FILE | sort

        # === Disable unused plugins (sed -i on the TEMPLATE file) ===

        # OpenVPN + crypto stack (~2.5MB)
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENVPN=y/CONFIG_FIRMWARE_INCLUDE_OPENVPN=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=y/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SFTP=y/CONFIG_FIRMWARE_INCLUDE_SFTP=n/' $CONFIG_FILE

        # Samba (~1.5MB) - no USB on CR660x
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMBD36=y/CONFIG_FIRMWARE_INCLUDE_SMBD36=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMBD=y/CONFIG_FIRMWARE_INCLUDE_SMBD=n/' $CONFIG_FILE

        # TCPDUMP (~0.6MB)
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TCPDUMP=y/CONFIG_FIRMWARE_INCLUDE_TCPDUMP=n/' $CONFIG_FILE

        # XUPNPD (IPTV)
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_XUPNPD=y/CONFIG_FIRMWARE_INCLUDE_XUPNPD=n/' $CONFIG_FILE

        # FFMPEG
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=y/CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=n/' $CONFIG_FILE

        # Campus auth / DOGCOM
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DOGCOM=y/CONFIG_FIRMWARE_INCLUDE_DOGCOM=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_MENTOHUST=y/CONFIG_FIRMWARE_INCLUDE_MENTOHUST=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=y/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_GDUT_DRCOM=y/CONFIG_FIRMWARE_INCLUDE_GDUT_DRCOM=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_MINIEAP=y/CONFIG_FIRMWARE_INCLUDE_MINIEAP=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_NJIT_CLIENT=y/CONFIG_FIRMWARE_INCLUDE_NJIT_CLIENT=n/' $CONFIG_FILE

        # Misc
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_VLMCSD=y/CONFIG_FIRMWARE_INCLUDE_VLMCSD=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_NAPT66=y/CONFIG_FIRMWARE_INCLUDE_NAPT66=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_IPERF3=y/CONFIG_FIRMWARE_INCLUDE_IPERF3=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOCAT=y/CONFIG_FIRMWARE_INCLUDE_SOCAT=n/' $CONFIG_FILE

        # Proxy/VPN (most already =n in CR660x, but be thorough)
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSSERVER=y/CONFIG_FIRMWARE_INCLUDE_SSSERVER=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_V2RAY=y/CONFIG_FIRMWARE_INCLUDE_V2RAY=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TROJAN=y/CONFIG_FIRMWARE_INCLUDE_TROJAN=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_XRAY=y/CONFIG_FIRMWARE_INCLUDE_XRAY=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FRPC=y/CONFIG_FIRMWARE_INCLUDE_FRPC=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FRPS=y/CONFIG_FIRMWARE_INCLUDE_FRPS=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y/CONFIG_FIRMWARE_INCLUDE_ZEROTIER=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_SERVER=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_SERVER=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CLIENT=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CLIENT=n/' $CONFIG_FILE
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CMD=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CMD=n/' $CONFIG_FILE

        # Enable QoS
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_QOS=n/CONFIG_FIRMWARE_INCLUDE_QOS=y/' $CONFIG_FILE

        echo ""
        echo "============================================"
        echo "=== Modified template: plugins still enabled (=y) ==="
        echo "============================================"
        grep "CONFIG_FIRMWARE_INCLUDE.*=y" $CONFIG_FILE | sort

        echo ""
        echo "=== Wireless config (must be intact) ==="
        grep -E "CONFIG_FIRMWARE_WIFI|CONFIG_FIRMWARE_ENABLE_IPV6|CONFIG_FIRMWARE_INCLUDE_SFE|CONFIG_FIRMWARE_INCLUDE_EAP" $CONFIG_FILE

    - name: Download go2rtc binary
      run: |
        cd /opt/rt-n56u/trunk
        mkdir -p user/go2rtc
        wget -q -O user/go2rtc/go2rtc "https://github.com/AlexxIT/go2rtc/releases/download/v1.9.14/go2rtc_linux_mipsel"
        chmod +x user/go2rtc/go2rtc
        echo "go2rtc binary size: $(du -h user/go2rtc/go2rtc | cut -f1)"
        file user/go2rtc/go2rtc

    - name: Create go2rtc package
      run: |
        cd /opt/rt-n56u/trunk/user/go2rtc

        cat > go2rtc.yaml << 'YAMLEOF'
        api:
          listen: ":1984"
        rtsp:
          listen: ":554"
        webrtc:
          listen: ":8555"
        hls:
          listen: ":8083"
        mjpeg:
          listen: ":8080"
        log:
          level: info
          exec: none
        streams:
          # Add your camera streams here:
          # camera1:
          #   - rtsp://admin:password@192.168.1.201:554/stream1
        YAMLEOF

        cat > go2rtc_setup.sh << 'SCRIPTEOF'
        #!/bin/sh
        # go2rtc first-boot setup and auto-start
        GO2RTC_DIR=/etc/storage/go2rtc
        STARTED=/etc/storage/started_script.sh

        mkdir -p $GO2RTC_DIR

        if [ ! -f $GO2RTC_DIR/go2rtc.yaml ]; then
            cp /etc/go2rtc.yaml $GO2RTC_DIR/go2rtc.yaml
        fi

        if [ ! -f $GO2RTC_DIR/start.sh ]; then
            echo '#!/bin/sh' > $GO2RTC_DIR/start.sh
            echo 'killall go2rtc 2>/dev/null' >> $GO2RTC_DIR/start.sh
            echo 'sleep 1' >> $GO2RTC_DIR/start.sh
            echo '/usr/bin/go2rtc -config /etc/storage/go2rtc/go2rtc.yaml > /tmp/go2rtc.log 2>&1 &' >> $GO2RTC_DIR/start.sh
            chmod +x $GO2RTC_DIR/start.sh
        fi

        if ! grep -q "go2rtc" $STARTED 2>/dev/null; then
            echo "" >> $STARTED
            echo "# go2rtc auto-start" >> $STARTED
            echo "sleep 8 && sh /etc/storage/go2rtc/start.sh" >> $STARTED
            chmod +x $STARTED
            /sbin/mtd_storage.sh save 2>/dev/null
        fi

        sleep 5
        sh $GO2RTC_DIR/start.sh
        SCRIPTEOF
        chmod +x go2rtc_setup.sh

        printf -- '-include ../options.mak\n\nall:\n\t@echo "go2rtc: nothing to build (pre-compiled binary)"\n\nclean:\n\t@echo "go2rtc: nothing to clean"\n\nromfs:\n\t@echo ">>> Installing go2rtc to romfs..."\n\tmkdir -p $(ROMFSDIR)/usr/bin\n\tcp go2rtc $(ROMFSDIR)/usr/bin/go2rtc\n\tchmod 755 $(ROMFSDIR)/usr/bin/go2rtc\n\tmkdir -p $(ROMFSDIR)/etc\n\tcp go2rtc.yaml $(ROMFSDIR)/etc/go2rtc.yaml\n\tmkdir -p $(ROMFSDIR)/usr/sbin\n\tcp go2rtc_setup.sh $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\tchmod 755 $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\t@echo ">>> go2rtc installed successfully"\n' > Makefile

        echo "=== go2rtc package created ==="
        ls -la

    - name: CRITICAL FIX - Create custom-perf package (NOT merge/ directory!)
      run: |
        cd /opt/rt-n56u/trunk/user
        mkdir -p custom-perf

        # ==================================================================
        # ROOT CAUSE FIX: Padavan build system does NOT support merge/ dir!
        # The S99custom script was created in merge/etc/init.d/ but never
        # copied to romfs. FIX: Use a proper user package with Makefile,
        # same approach as go2rtc.
        # ==================================================================

        cat > custom-perf/S99custom << 'INITEOF'
        #!/bin/sh
        # ==============================================
        # Maximum Performance Optimization for CR660x/TR608
        # MT7621A 880MHz dual-core | 256MB RAM
        # ==============================================

        # === 1. CPU GOVERNOR -> PERFORMANCE ===
        for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          [ -f "$cpu" ] && echo performance > "$cpu" 2>/dev/null
        done
        for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_max_freq; do
          [ -f "$cpu" ] && cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq > "$cpu" 2>/dev/null
        done

        # === 2. CPU OVERCLOCK (880MHz -> 1000MHz) ===
        # Crash-safe: flag files prevent boot loop if OC causes hang
        OC_TRYING=/etc/storage/.oc_trying
        OC_DONE=/etc/storage/.oc_done
        OC_CRASHED=/etc/storage/.oc_crashed

        if [ -f "$OC_CRASHED" ]; then
          echo "[OC] Disabled (previous attempt crashed)"
        elif [ -f "$OC_DONE" ]; then
          echo "[OC] Active (1000MHz)"
        elif [ -f "$OC_TRYING" ]; then
          rm -f "$OC_TRYING"
          touch "$OC_CRASHED"
          /sbin/mtd_storage.sh save 2>/dev/null
          echo "[OC] Previous attempt crashed. Disabled."
        else
          DEVMEM=""
          [ -x /sbin/devmem ] && DEVMEM=/sbin/devmem
          [ -x /usr/bin/devmem ] && DEVMEM=/usr/bin/devmem
          if [ -n "$DEVMEM" ]; then
            touch "$OC_TRYING"
            /sbin/mtd_storage.sh save 2>/dev/null
            sync
            sleep 1
            CUR=$($DEVMEM 0x1E00002C 2>/dev/null)
            if [ -n "$CUR" ]; then
              echo "[OC] Current CLKCFG0=$CUR, attempting 1000MHz..."
              NEW=$(( CUR | (1 << 8) ))
              $DEVMEM 0x1E00002C 32 $NEW 2>/dev/null
              rm -f "$OC_TRYING"
              touch "$OC_DONE"
              /sbin/mtd_storage.sh save 2>/dev/null
              echo "[OC] SUCCESS! CPU now at 1000MHz"
            fi
          else
            echo "[OC] devmem not available, skipping overclock"
          fi
        fi

        # === 3. NETWORK BUFFER OPTIMIZATION ===
        echo 1048576 > /proc/sys/net/core/rmem_max 2>/dev/null
        echo 1048576 > /proc/sys/net/core/wmem_max 2>/dev/null
        echo 65536 > /proc/sys/net/core/rmem_default 2>/dev/null
        echo 65536 > /proc/sys/net/core/wmem_default 2>/dev/null
        echo 8192 > /proc/sys/net/core/netdev_max_backlog 2>/dev/null
        echo 2048 > /proc/sys/net/core/somaxconn 2>/dev/null

        # === 4. TCP OPTIMIZATION ===
        echo 1 > /proc/sys/net/ipv4/tcp_fastopen 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_low_latency 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_keepalive_probes 2>/dev/null
        echo 30 > /proc/sys/net/ipv4/tcp_fin_timeout 2>/dev/null
        echo 4096 > /proc/sys/net/ipv4/tcp_max_syn_backlog 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_syn_retries 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_synack_retries 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_redirects 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/send_redirects 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_source_route 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_window_scaling 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_timestamps 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_sack 2>/dev/null

        # === 5. WIRELESS REPEATER OPTIMIZATION (apcli0) ===
        if [ -d /sys/class/net/apcli0 ]; then
          iwpriv apcli0 set LongRetryLimit=8 2>/dev/null
          iwpriv apcli0 set ShortRetryLimit=7 2>/dev/null
          iwpriv apcli0 set TxPower=100 2>/dev/null
          iwpriv apcli0 set BGProtection=0 2>/dev/null
          iwpriv apcli0 set RoamSensitive=10 2>/dev/null
          echo "[WiFi] apcli0 repeater optimized"
        fi

        for iface in ra0 rai0; do
          if [ -d /sys/class/net/$iface ]; then
            iwpriv $iface set TxPower=100 2>/dev/null
            iwpriv $iface set BGProtection=0 2>/dev/null
            iwpriv $iface set ShortRetryLimit=7 2>/dev/null
            iwpriv $iface set LongRetryLimit=8 2>/dev/null
          fi
        done

        # === 6. SFE HARDWARE ACCELERATION ===
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/shortcut-fe-cm.ko 2>/dev/null
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/fast-classifier.ko 2>/dev/null
        echo 1 > /sys/fast_classifier/defrag 2>/dev/null
        echo "[SFE] Hardware acceleration enabled"

        # === 7. MEMORY OPTIMIZATION ===
        echo 50 > /proc/sys/vm/vfs_cache_pressure 2>/dev/null
        echo 5 > /proc/sys/vm/dirty_ratio 2>/dev/null
        echo 1 > /proc/sys/vm/dirty_background_ratio 2>/dev/null
        echo 8192 > /proc/sys/vm/min_free_kbytes 2>/dev/null
        echo 10 > /proc/sys/vm/swappiness 2>/dev/null

        # === 8. TIMER & SCHEDULER ===
        echo 1 > /proc/sys/kernel/watchdog 2>/dev/null
        echo 500 > /proc/sys/kernel/sched_migration_cost_ns 2>/dev/null

        # === 9. START go2rtc ===
        sleep 8 && /usr/sbin/go2rtc_setup.sh &

        echo "=== Optimization complete ==="
        INITEOF
        chmod +x custom-perf/S99custom

        printf -- '-include ../options.mak\n\nall:\n\t@echo "custom-perf: nothing to build"\n\nclean:\n\t@echo "custom-perf: nothing to clean"\n\nromfs:\n\t@echo ">>> Installing S99custom to romfs..."\n\tmkdir -p $(ROMFSDIR)/etc/init.d\n\tcp S99custom $(ROMFSDIR)/etc/init.d/S99custom\n\tchmod 755 $(ROMFSDIR)/etc/init.d/S99custom\n\t@echo ">>> S99custom installed successfully"\n' > custom-perf/Makefile

        echo "=== custom-perf package created ==="
        ls -la custom-perf/
        echo "=== Makefile content ==="
        cat -A custom-perf/Makefile

    - name: Add go2rtc and custom-perf to user Makefile
      run: |
        cd /opt/rt-n56u/trunk/user
        echo "=== user/Makefile (before) ==="
        grep -n "dir_y" Makefile | head -20

        # Add go2rtc after scripts line
        if ! grep -q "go2rtc" Makefile; then
          sed -i '/dir_y.*+= scripts/a dir_y += go2rtc' Makefile
        fi
        # Add custom-perf after go2rtc line
        if ! grep -q "custom-perf" Makefile; then
          sed -i '/dir_y.*+= go2rtc/a dir_y += custom-perf' Makefile
        fi

        echo "=== user/Makefile (after) ==="
        grep -n "go2rtc\|custom-perf\|dir_y" Makefile | tail -15

    - name: Build firmware
      run: |
        cd /opt/rt-n56u/trunk
        # Create .config from modified template BEFORE clear_tree
        # (clear_tree checks for .config existence and fails if missing)
        cp -f configs/templates/$TNAME.config .config
        sudo ./clear_tree
        sudo fakeroot ./build_firmware_modify $TNAME 0

        # === VERIFICATION ===
        echo ""
        echo "======== VERIFICATION ========"
        echo "=== Check S99custom in romfs ==="
        ls -la romfs/etc/init.d/S99custom 2>/dev/null && echo "[OK] S99custom is in romfs" || echo "[FAIL] S99custom MISSING from romfs!"

        echo "=== Check go2rtc in romfs ==="
        ls -la romfs/usr/bin/go2rtc 2>/dev/null && echo "[OK] go2rtc binary is in romfs" || echo "[FAIL] go2rtc MISSING from romfs!"
        ls -la romfs/usr/sbin/go2rtc_setup.sh 2>/dev/null && echo "[OK] go2rtc_setup.sh is in romfs" || echo "[FAIL] go2rtc_setup.sh MISSING!"

        echo "=== Check disabled plugins NOT in romfs ==="
        for plugin in openvpn tcpdump xupnpd vlmcsd dogcom iperf3 socat; do
          FOUND=$(find romfs -name "*${plugin}*" 2>/dev/null | head -1)
          if [ -n "$FOUND" ]; then
            echo "[WARN] $plugin still in romfs: $FOUND"
          else
            echo "[OK] $plugin removed from romfs"
          fi
        done

        echo "=== Check .config matches modified template ==="
        diff configs/templates/$TNAME.config .config && echo "[OK] .config matches template" || echo "[INFO] .config differs (toolchain dir appended)"

        echo "=== Final firmware ==="
        sudo mv -f images/*.trx /opt/images/
        ls -lh /opt/images/

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-CR660x-Custom-v5
        path: /opt/images

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-v5
        path: |
          /opt/rt-n56u/trunk/images/
          /opt/rt-n56u/trunk/.config
          /opt/rt-n56u/trunk/configs/templates/
          /opt/rt-n56u/trunk/user/Makefile
          /opt/rt-n56u/trunk/user/custom-perf/
          /opt/rt-n56u/trunk/user/go2rtc/
