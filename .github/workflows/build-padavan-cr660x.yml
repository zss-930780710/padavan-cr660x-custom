name: Build Padavan CR660x Custom

on:
  workflow_dispatch:
  watch:
    types: [started]

env:
  TNAME: CR660x
  KERNEL: "3.4"

jobs:
  build:
    runs-on: ubuntu-20.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Download go2rtc binary
      run: |
        cd /opt/rt-n56u/trunk
        mkdir -p user/go2rtc
        wget -q -O user/go2rtc/go2rtc "https://github.com/AlexxIT/go2rtc/releases/latest/download/go2rtc_linux_mipsel"
        chmod +x user/go2rtc/go2rtc
        echo "go2rtc binary size: $(du -h user/go2rtc/go2rtc | cut -f1)"
        file user/go2rtc/go2rtc

    - name: Create go2rtc package
      run: |
        cd /opt/rt-n56u/trunk/user/go2rtc

        # --- go2rtc.yaml default config ---
        cat > go2rtc.yaml << 'YAMLEOF'
        api:
          listen: ":1984"
        rtsp:
          listen: ":554"
        webrtc:
          listen: ":8555"
        hls:
          listen: ":8083"
        mjpeg:
          listen: ":8080"
        log:
          level: info
          exec: none
        streams:
          # Add your camera streams here:
          # camera1:
          #   - rtsp://admin:password@192.168.1.201:554/stream1
        YAMLEOF

        # --- go2rtc_setup.sh: first-boot auto-config ---
        cat > go2rtc_setup.sh << 'SCRIPTEOF'
        #!/bin/sh
        # go2rtc first-boot setup and auto-start
        GO2RTC_DIR=/etc/storage/go2rtc
        STARTED=/etc/storage/started_script.sh

        mkdir -p $GO2RTC_DIR

        # Copy default config if not exists
        if [ ! -f $GO2RTC_DIR/go2rtc.yaml ]; then
            cp /etc/go2rtc.yaml $GO2RTC_DIR/go2rtc.yaml
        fi

        # Create start script
        if [ ! -f $GO2RTC_DIR/start.sh ]; then
            echo '#!/bin/sh' > $GO2RTC_DIR/start.sh
            echo 'killall go2rtc 2>/dev/null' >> $GO2RTC_DIR/start.sh
            echo 'sleep 1' >> $GO2RTC_DIR/start.sh
            echo '/usr/bin/go2rtc -config /etc/storage/go2rtc/go2rtc.yaml > /tmp/go2rtc.log 2>&1 &' >> $GO2RTC_DIR/start.sh
            chmod +x $GO2RTC_DIR/start.sh
        fi

        # Add to started_script.sh if not present
        if ! grep -q "go2rtc" $STARTED 2>/dev/null; then
            echo "" >> $STARTED
            echo "# go2rtc auto-start" >> $STARTED
            echo "sleep 8 && sh /etc/storage/go2rtc/start.sh" >> $STARTED
            chmod +x $STARTED
            /sbin/mtd_storage.sh save 2>/dev/null
        fi

        # Start go2rtc now
        sleep 5
        sh $GO2RTC_DIR/start.sh
        SCRIPTEOF
        chmod +x go2rtc_setup.sh

        # --- Makefile (uses printf to ensure TAB characters) ---
        printf 'include ../options.mak\n\nromfs:\n\t@echo ">>> Installing go2rtc to romfs..."\n\tmkdir -p $(ROMFSDIR)/usr/bin\n\tcp go2rtc $(ROMFSDIR)/usr/bin/go2rtc\n\tchmod 755 $(ROMFSDIR)/usr/bin/go2rtc\n\tmkdir -p $(ROMFSDIR)/etc\n\tcp go2rtc.yaml $(ROMFSDIR)/etc/go2rtc.yaml\n\tmkdir -p $(ROMFSDIR)/usr/sbin\n\tcp go2rtc_setup.sh $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\tchmod 755 $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\t@echo ">>> go2rtc installed successfully"\n' > Makefile

        echo "=== go2rtc package created ==="
        ls -la
        echo "=== Makefile content ==="
        cat -A Makefile | head -20

    - name: Add go2rtc to user Makefile
      run: |
        cd /opt/rt-n56u/trunk/user
        echo "=== user/Makefile (before) ==="
        head -30 Makefile
        # Padavan user/Makefile uses SUBDIRS - add go2rtc
        if ! grep -q "go2rtc" Makefile 2>/dev/null; then
          echo "Adding go2rtc to SUBDIRS..."
          sed -i '/^SUBDIRS :=/s/$/ go2rtc/' Makefile 2>/dev/null || true
          sed -i '/^SUBDIRS =/s/$/ go2rtc/' Makefile 2>/dev/null || true
          # If no SUBDIRS line, check if it uses obj-y or similar
          if ! grep -q "go2rtc" Makefile; then
            echo 'SUBDIRS += go2rtc' >> Makefile
          fi
        fi
        echo "=== user/Makefile (after) ==="
        grep -n "go2rtc\|SUBDIRS" Makefile

    - name: Add go2rtc to web menu
      run: |
        cd /opt/rt-n56u/trunk
        # Add go2rtc menu entry to the web interface
        # Padavan stores menu definitions in romfs/www/
        MENU_FILE="romfs/www/EN.dict"
        if [ -f "$MENU_FILE" ]; then
          # Add go2rtc menu text
          if ! grep -q "go2rtc" "$MENU_FILE"; then
            echo 'menu12_title1=go2rtc' >> "$MENU_FILE"
            echo 'tablink121=Advanced_Extensions_app33.asp' >> "$MENU_FILE"
          fi
        fi

        # Create go2rtc web page (redirect to go2rtc web UI)
        cat > romfs/www/Advanced_Extensions_go2rtc.asp << 'ASPEOF'
        <!DOCTYPE html>
        <html>
        <head>
        <meta charset="utf-8">
        <meta http-equiv="refresh" content="0;url=http://192.168.1.100:1984">
        <title>go2rtc</title>
        <style>
        body{font-family:sans-serif;text-align:center;padding:50px;background:#1a1a2e;color:#e0e0e0}
        a{color:#0ae;text-decoration:none;font-size:18px}
        </style>
        </head>
        <body>
        <h2>go2rtc 视频流媒体服务</h2>
        <p>正在跳转到 go2rtc 管理界面...</p>
        <p><a href="http://192.168.1.100:1984">点击这里如果没有自动跳转</a></p>
        </body>
        </html>
        ASPEOF

        echo "=== go2rtc web page created ==="

    - name: Customize web UI (beautify)
      run: |
        cd /opt/rt-n56u/trunk/romfs/www

        # Add custom CSS for modern look
        mkdir -p css
        cat > css/custom.css << 'CSSEOF'
        /* Custom UI enhancements for CR660x */
        /* Modern flat theme */
        body {
          font-family: "Microsoft YaHei", "Segoe UI", sans-serif !important;
        }
        .table td, .table th {
          padding: 6px 8px !important;
        }
        .nav-desktop > li > a {
          font-size: 13px !important;
        }
        input[type="text"], input[type="password"], select, textarea {
          border-radius: 4px !important;
          border: 1px solid #d0d0d0 !important;
          padding: 4px 8px !important;
        }
        .btn, button {
          border-radius: 4px !important;
        }
        CSSEOF

        # Append custom CSS link to the main template
        INDEX_FILE="index.asp"
        if [ -f "$INDEX_FILE" ]; then
          if ! grep -q "custom.css" "$INDEX_FILE"; then
            sed -i '/<\/head>/i <link rel="stylesheet" href="/css/custom.css">' "$INDEX_FILE"
          fi
        fi

        echo "=== Web UI customized ==="

    - name: Add post-boot optimization script
      run: |
        cd /opt/rt-n56u/trunk

        # Create a post-boot optimization script that runs on first boot
        mkdir -p romfs/etc/storage
        cat > romfs/etc/storage/first_boot_optimize.sh << 'OPT_EOF'
        #!/bin/sh
        # First-boot optimization for CR660x
        # Only runs once, then saves to storage

        FLAG=/etc/storage/.optimized
        if [ -f "$FLAG" ]; then
          exit 0
        fi

        # --- Network performance tuning ---
        # Increase network buffer sizes
        echo 262144 > /proc/sys/net/core/rmem_max
        echo 262144 > /proc/sys/net/core/wmem_max
        echo 16384 > /proc/sys/net/core/rmem_default
        echo 16384 > /proc/sys/net/core/wmem_default
        echo 4096 > /proc/sys/net/core/netdev_max_backlog

        # TCP optimization
        echo 1 > /proc/sys/net/ipv4/tcp_fastopen
        echo 1 > /proc/sys/net/ipv4/tcp_low_latency
        echo 3 > /proc/sys/net/ipv4/tcp_keepalive_probes
        echo 30 > /proc/sys/net/ipv4/tcp_fin_timeout
        echo 5 > /proc/sys/net/ipv4/tcp_tw_reuse 2>/dev/null || true
        echo 4096 > /proc/sys/net/ipv4/tcp_max_syn_backlog

        # Disable unnecessary kernel features (save RAM)
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_redirects
        echo 0 > /proc/sys/net/ipv4/conf/all/send_redirects
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_source_route

        # --- Wireless repeater optimization ---
        # Optimize apcli0 wireless parameters for stable repeater
        if [ -d /sys/class/net/apcli0 ]; then
          # Set higher retry limits for stability
          iwpriv apcli0 set LongRetryLimit=8 2>/dev/null
          iwpriv apcli0 set ShortRetryLimit=7 2>/dev/null
          # Optimize TX power
          iwpriv apcli0 set TxPower=100 2>/dev/null
          # Set BG protection mode
          iwpriv apcli0 set BGProtection=0 2>/dev/null
        fi

        # --- SFE hardware acceleration ---
        # Ensure SFE is loaded and enabled
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/shortcut-fe-cm.ko 2>/dev/null
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/fast-classifier.ko 2>/dev/null
        echo 1 > /sys/fast_classifier/defrag 2>/dev/null

        # --- DNS cache optimization ---
        # Reduce dnsmasq cache pressure
        if [ -f /etc/storage/dnsmasq/dnsmasq.conf ]; then
          echo "cache-size=1000" >> /etc/storage/dnsmasq/dnsmasq.conf
          echo "dns-forward-max=500" >> /etc/storage/dnsmasq/dnsmasq.conf
        fi

        # --- Memory optimization ---
        # Free page cache
        echo 3 > /proc/sys/vm/drop_caches 2>/dev/null
        # Reduce swappiness (prefer keeping apps in RAM)
        echo 10 > /proc/sys/vm/swappiness 2>/dev/null

        # --- go2rtc auto-start ---
        /usr/sbin/go2rtc_setup.sh &

        # Mark as optimized
        touch "$FLAG"
        /sbin/mtd_storage.sh save 2>/dev/null

        echo "First-boot optimization complete."
        OPT_EOF
        chmod +x romfs/etc/storage/first_boot_optimize.sh

        # Add first-boot script to started_script.sh template
        STARTED_TPL="romfs/etc/storage/started_script.sh"
        if [ -f "$STARTED_TPL" ]; then
          if ! grep -q "first_boot_optimize" "$STARTED_TPL"; then
            echo "" >> "$STARTED_TPL"
            echo "# First-boot optimization" >> "$STARTED_TPL"
            echo "sleep 10 && sh /etc/storage/first_boot_optimize.sh &" >> "$STARTED_TPL"
            chmod +x "$STARTED_TPL"
          fi
        fi

        echo "=== Post-boot optimization script created ==="

    - name: Configure firmware (minimal & optimized)
      run: |
        cd /opt/rt-n56u/trunk
        cp -f configs/templates/$TNAME.config .config

        # =====================================================
        # Remove ALL plugin configs (will re-add only essential)
        # =====================================================
        for plugin in MENTOHUST SCUTCLIENT SHADOWSOCKS SSSERVER SSOBFS DNSFORWARDER \
          ADBYBY FRPC FRPS TUNSAFE ALIDDNS SMARTDNS SMARTDNSBIN SRELAY V2RAY TROJAN \
          KOOLPROXY CADDY CADDYBIN ADGUARDHOME WYY WYYBIN ZEROTIER XRAY DDNSTO ALDRIVER \
          OPENVPN SSWAN XUPNPD MINIDLNA FIREFLY TRANSMISSION TRANSMISSION_WEB_CONTROL \
          ARIA ARIA_WEB_CONTROL DOGCOM NAPT66 SOFTETHERVPN_SERVER SOFTETHERVPN_CLIENT \
          SOFTETHERVPN_CMD DUMP1090 RTL_SDR VLMCSD SMBD SMBD36 TCPDUMP SFTP OPENSSH \
          DROPBEAR NTFS_3G GDUT_DRCOM MINIEAP NJIT_CLIENT LRZSZ FFMPEG_NEW EAP_PEAP \
          OPENSSL_EXE; do
          sed -i "/CONFIG_FIRMWARE_INCLUDE_${plugin}/d" .config
        done

        # =====================================================
        # DISABLE: All unnecessary plugins (save memory)
        # =====================================================
        for plugin in MENTOHUST SCUTCLIENT GDUT_DRCOM DOGCOM MINIEAP NJIT_CLIENT NAPT66 \
          SHADOWSOCKS SSSERVER SSOBFS V2RAY TROJAN XRAY DNSFORWARDER ADBYBY KOOLPROXY \
          ADGUARDHOME CADDY CADDYBIN WYY WYYBIN ZEROTIER DDNSTO ALDRIVER FRPC FRPS \
          TUNSAFE ALIDDNS SRELAY OPENVPN SSWAN SOFTETHERVPN_SERVER SOFTETHERVPN_CLIENT \
          SOFTETHERVPN_CMD XUPNPD MINIDLNA FIREFLY TRANSMISSION TRANSMISSION_WEB_CONTROL \
          ARIA ARIA_WEB_CONTROL DUMP1090 RTL_SDR NTFS_3G SMBD SMBD36 TCPDUMP SFTP \
          DROPBEAR LRZSZ FFMPEG_NEW; do
          echo "CONFIG_FIRMWARE_INCLUDE_${plugin}=n" >> .config
        done

        # =====================================================
        # ENABLE: Essential plugins only
        # =====================================================
        echo "CONFIG_FIRMWARE_INCLUDE_OPENSSH=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TTYD=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HTOP=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NANO=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IPERF3=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MTR=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SOCAT=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CURL=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_VLMCSD=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_EAP_PEAP=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y" >> .config

        # =====================================================
        # Performance optimizations
        # =====================================================
        echo "CONFIG_FIRMWARE_INCLUDE_SFE=y" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_USB=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_QOS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IPSET=y" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_IPV6=y" >> .config

        # Disable unnecessary filesystems (no USB on CR660x)
        for fs in UFSD FAT EXFAT EXT2 EXT3 EXT4 XFS FUSE SWAP; do
          echo "CONFIG_FIRMWARE_ENABLE_${fs}=n" >> .config
        done

        # Disable unnecessary kernel modules
        for mod in UVC HID SERIAL AUDIO XFRM IMQ IFB NFSD NFSC CIFS; do
          echo "CONFIG_FIRMWARE_INCLUDE_${mod}=n" >> .config
        done

        # Build optimization
        echo "CONFIG_FIRMWARE_INCLUDE_LANG_CN=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_LANG_EN=y" >> .config

        echo "=== Final .config (key entries) ==="
        grep -E "CONFIG_FIRMWARE_INCLUDE|CONFIG_FIRMWARE_ENABLE" .config | sort

    - name: Build firmware
      run: |
        cd /opt/rt-n56u/trunk
        sudo ./clear_tree
        sudo fakeroot ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/
        ls -lh /opt/images/

    - name: Upload firmware
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Padavan-CR660x-Custom
        path: /opt/images

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-log
        path: |
          /opt/rt-n56u/trunk/images/
          /opt/rt-n56u/trunk/.config
