name: Build Padavan CR660x Custom v4

on:
  workflow_dispatch:
  watch:
    types: [started]

env:
  TNAME: CR660x
  KERNEL: "3.4"

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Download go2rtc binary
      run: |
        cd /opt/rt-n56u/trunk
        mkdir -p user/go2rtc
        wget -q -O user/go2rtc/go2rtc "https://github.com/AlexxIT/go2rtc/releases/download/v1.9.14/go2rtc_linux_mipsel"
        chmod +x user/go2rtc/go2rtc
        echo "go2rtc binary size: $(du -h user/go2rtc/go2rtc | cut -f1)"
        file user/go2rtc/go2rtc

    - name: Create go2rtc package
      run: |
        cd /opt/rt-n56u/trunk/user/go2rtc

        # --- go2rtc.yaml default config ---
        cat > go2rtc.yaml << 'YAMLEOF'
        api:
          listen: ":1984"
        rtsp:
          listen: ":554"
        webrtc:
          listen: ":8555"
        hls:
          listen: ":8083"
        mjpeg:
          listen: ":8080"
        log:
          level: info
          exec: none
        streams:
          # Add your camera streams here:
          # camera1:
          #   - rtsp://admin:password@192.168.1.201:554/stream1
        YAMLEOF

        # --- go2rtc_setup.sh: first-boot auto-config ---
        cat > go2rtc_setup.sh << 'SCRIPTEOF'
        #!/bin/sh
        # go2rtc first-boot setup and auto-start
        GO2RTC_DIR=/etc/storage/go2rtc
        STARTED=/etc/storage/started_script.sh

        mkdir -p $GO2RTC_DIR

        # Copy default config if not exists
        if [ ! -f $GO2RTC_DIR/go2rtc.yaml ]; then
            cp /etc/go2rtc.yaml $GO2RTC_DIR/go2rtc.yaml
        fi

        # Create start script
        if [ ! -f $GO2RTC_DIR/start.sh ]; then
            echo '#!/bin/sh' > $GO2RTC_DIR/start.sh
            echo 'killall go2rtc 2>/dev/null' >> $GO2RTC_DIR/start.sh
            echo 'sleep 1' >> $GO2RTC_DIR/start.sh
            echo '/usr/bin/go2rtc -config /etc/storage/go2rtc/go2rtc.yaml > /tmp/go2rtc.log 2>&1 &' >> $GO2RTC_DIR/start.sh
            chmod +x $GO2RTC_DIR/start.sh
        fi

        # Add to started_script.sh if not present
        if ! grep -q "go2rtc" $STARTED 2>/dev/null; then
            echo "" >> $STARTED
            echo "# go2rtc auto-start" >> $STARTED
            echo "sleep 8 && sh /etc/storage/go2rtc/start.sh" >> $STARTED
            chmod +x $STARTED
            /sbin/mtd_storage.sh save 2>/dev/null
        fi

        # Start go2rtc now
        sleep 5
        sh $GO2RTC_DIR/start.sh
        SCRIPTEOF
        chmod +x go2rtc_setup.sh

        # --- Makefile (uses printf -- to handle -include prefix) ---
        printf -- '-include ../options.mak\n\nall:\n\t@echo "go2rtc: nothing to build (pre-compiled binary)"\n\nclean:\n\t@echo "go2rtc: nothing to clean"\n\nromfs:\n\t@echo ">>> Installing go2rtc to romfs..."\n\tmkdir -p $(ROMFSDIR)/usr/bin\n\tcp go2rtc $(ROMFSDIR)/usr/bin/go2rtc\n\tchmod 755 $(ROMFSDIR)/usr/bin/go2rtc\n\tmkdir -p $(ROMFSDIR)/etc\n\tcp go2rtc.yaml $(ROMFSDIR)/etc/go2rtc.yaml\n\tmkdir -p $(ROMFSDIR)/usr/sbin\n\tcp go2rtc_setup.sh $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\tchmod 755 $(ROMFSDIR)/usr/sbin/go2rtc_setup.sh\n\t@echo ">>> go2rtc installed successfully"\n' > Makefile

        echo "=== go2rtc package created ==="
        ls -la
        echo "=== Makefile content ==="
        cat -A Makefile | head -20

    - name: Add go2rtc to user Makefile
      run: |
        cd /opt/rt-n56u/trunk/user
        echo "=== user/Makefile (before, key lines) ==="
        grep -n "dir_y" Makefile | head -20
        # Padavan user/Makefile uses dir_y variable (NOT SUBDIRS!)
        # SUBDIRS is a kernel kbuild reserved variable - using it breaks busybox build
        if ! grep -q "go2rtc" Makefile 2>/dev/null; then
          echo "Adding go2rtc to dir_y..."
          # Insert after the scripts line (last unconditional dir_y entry)
          sed -i '/dir_y.*+= scripts/a dir_y += go2rtc' Makefile
        fi
        echo "=== user/Makefile (after) ==="
        grep -n "go2rtc\|dir_y" Makefile | tail -10
        # Verify no SUBDIRS was accidentally created
        if grep -q "^SUBDIRS" Makefile; then
          echo "ERROR: SUBDIRS variable found! Removing it..."
          sed -i '/^SUBDIRS/d' Makefile
        fi

    - name: Create merge directory for performance optimization
      run: |
        cd /opt/rt-n56u/trunk
        # Padavan build system merges trunk/merge/ into romfs during build
        mkdir -p merge/etc/init.d

        # --- Maximum performance init script ---
        cat > merge/etc/init.d/S99custom << 'INITEOF'
        #!/bin/sh
        # ==============================================
        # Maximum Performance Optimization for CR660x/TR608
        # MT7621A 880MHz dual-core | 256MB RAM
        # ==============================================

        # === 1. CPU GOVERNOR -> PERFORMANCE ===
        # Forces CPU to always run at maximum frequency
        for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          [ -f "$cpu" ] && echo performance > "$cpu" 2>/dev/null
        done
        for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_max_freq; do
          [ -f "$cpu" ] && cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq > "$cpu" 2>/dev/null
        done

        # === 2. CPU OVERCLOCK ATTEMPT (880MHz -> 1000MHz) ===
        # Crash-safe: uses flag files. If router hangs, it reboots and disables OC.
        OC_TRYING=/etc/storage/.oc_trying
        OC_DONE=/etc/storage/.oc_done
        OC_CRASHED=/etc/storage/.oc_crashed

        if [ -f "$OC_CRASHED" ]; then
          echo "[OC] Disabled (previous attempt crashed)"
        elif [ -f "$OC_DONE" ]; then
          echo "[OC] Active (1000MHz)"
        elif [ -f "$OC_TRYING" ]; then
          # Was trying but crashed - mark as crashed
          rm -f "$OC_TRYING"
          touch "$OC_CRASHED"
          /sbin/mtd_storage.sh save 2>/dev/null
          echo "[OC] Previous attempt crashed. Disabled."
        else
          # First attempt - try overclock
          DEVMEM=""
          [ -x /sbin/devmem ] && DEVMEM=/sbin/devmem
          [ -x /usr/bin/devmem ] && DEVMEM=/usr/bin/devmem
          if [ -n "$DEVMEM" ]; then
            touch "$OC_TRYING"
            /sbin/mtd_storage.sh save 2>/dev/null
            sync
            sleep 1
            # Read CLKCFG0 register (0x1E00002C)
            # Bit[10:8]=CPU_CLK_SEL: 0=880MHz, 1=1000MHz
            CUR=$($DEVMEM 0x1E00002C 2>/dev/null)
            if [ -n "$CUR" ]; then
              echo "[OC] Current CLKCFG0=$CUR, attempting 1000MHz..."
              # Set bit[10:8]=001 for 1000MHz
              NEW=$(( CUR | (1 << 8) ))
              $DEVMEM 0x1E00002C 32 $NEW 2>/dev/null
              # If we reach here, overclock didn't crash
              rm -f "$OC_TRYING"
              touch "$OC_DONE"
              /sbin/mtd_storage.sh save 2>/dev/null
              echo "[OC] SUCCESS! CPU now at 1000MHz"
            fi
          else
            echo "[OC] devmem not available, skipping overclock"
          fi
        fi

        # === 3. NETWORK BUFFER OPTIMIZATION ===
        # Maximize socket buffers for throughput
        echo 1048576 > /proc/sys/net/core/rmem_max 2>/dev/null
        echo 1048576 > /proc/sys/net/core/wmem_max 2>/dev/null
        echo 65536 > /proc/sys/net/core/rmem_default 2>/dev/null
        echo 65536 > /proc/sys/net/core/wmem_default 2>/dev/null
        echo 8192 > /proc/sys/net/core/netdev_max_backlog 2>/dev/null
        echo 2048 > /proc/sys/net/core/somaxconn 2>/dev/null

        # === 4. TCP OPTIMIZATION ===
        echo 1 > /proc/sys/net/ipv4/tcp_fastopen 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_low_latency 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_keepalive_probes 2>/dev/null
        echo 30 > /proc/sys/net/ipv4/tcp_fin_timeout 2>/dev/null
        echo 4096 > /proc/sys/net/ipv4/tcp_max_syn_backlog 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_syn_retries 2>/dev/null
        echo 3 > /proc/sys/net/ipv4/tcp_synack_retries 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_redirects 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/send_redirects 2>/dev/null
        echo 0 > /proc/sys/net/ipv4/conf/all/accept_source_route 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_window_scaling 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_timestamps 2>/dev/null
        echo 1 > /proc/sys/net/ipv4/tcp_sack 2>/dev/null

        # === 5. WIRELESS REPEATER OPTIMIZATION (apcli0) ===
        if [ -d /sys/class/net/apcli0 ]; then
          iwpriv apcli0 set LongRetryLimit=8 2>/dev/null
          iwpriv apcli0 set ShortRetryLimit=7 2>/dev/null
          iwpriv apcli0 set TxPower=100 2>/dev/null
          iwpriv apcli0 set BGProtection=0 2>/dev/null
          iwpriv apcli0 set RoamSensitive=10 2>/dev/null
          echo "[WiFi] apcli0 repeater optimized"
        fi

        # Optimize main WiFi interfaces too
        for iface in ra0 rai0; do
          if [ -d /sys/class/net/$iface ]; then
            iwpriv $iface set TxPower=100 2>/dev/null
            iwpriv $iface set BGProtection=0 2>/dev/null
            iwpriv $iface set ShortRetryLimit=7 2>/dev/null
            iwpriv $iface set LongRetryLimit=8 2>/dev/null
          fi
        done

        # === 6. SFE HARDWARE ACCELERATION ===
        # Shortcut Forward Engine - critical for wire-speed routing
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/shortcut-fe-cm.ko 2>/dev/null
        lsmod | grep -q fast_classifier || insmod /lib/modules/*/kernel/net/shortcut-fe/fast-classifier.ko 2>/dev/null
        echo 1 > /sys/fast_classifier/defrag 2>/dev/null
        echo "[SFE] Hardware acceleration enabled"

        # === 7. MEMORY OPTIMIZATION ===
        # Reduce cache pressure - more RAM for applications
        echo 50 > /proc/sys/vm/vfs_cache_pressure 2>/dev/null
        echo 5 > /proc/sys/vm/dirty_ratio 2>/dev/null
        echo 1 > /proc/sys/vm/dirty_background_ratio 2>/dev/null
        echo 8192 > /proc/sys/vm/min_free_kbytes 2>/dev/null
        echo 10 > /proc/sys/vm/swappiness 2>/dev/null

        # === 8. TIMER & SCHEDULER OPTIMIZATION ===
        # Reduce timer ticks for less CPU overhead
        echo 1 > /proc/sys/kernel/watchdog 2>/dev/null
        echo 500 > /proc/sys/kernel/sched_migration_cost_ns 2>/dev/null

        # === 9. START go2rtc ===
        sleep 8 && /usr/sbin/go2rtc_setup.sh &

        echo "=== Optimization complete ==="
        INITEOF
        chmod +x merge/etc/init.d/S99custom

        echo "=== Merge directory created ==="
        find merge -type f -ls

    - name: Configure firmware (minimal in-place changes)
      run: |
        cd /opt/rt-n56u/trunk
        # CRITICAL: Start with ORIGINAL CR660x.config - NO deletion, NO re-addition
        # Only use sed -i to change =y to =n for plugins we want to disable
        cp -f configs/templates/$TNAME.config .config

        echo "============================================"
        echo "=== Original config: plugins enabled (=y) ==="
        echo "============================================"
        grep "CONFIG_FIRMWARE_INCLUDE.*=y" .config | sort

        # =====================================================
        # DISABLE UNUSED PLUGINS (in-place sed, safe)
        # Each sed only changes lines that exactly match =y to =n
        # Lines that don't match are silently ignored
        # =====================================================

        echo ""
        echo "=== Disabling unused plugins ==="

        # --- Heavy plugins (big memory savings) ---
        # OpenVPN + crypto stack (~2.5MB total)
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENVPN=y/CONFIG_FIRMWARE_INCLUDE_OPENVPN=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=y/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SFTP=y/CONFIG_FIRMWARE_INCLUDE_SFTP=n/' .config
        echo "  [OFF] OpenVPN + OpenSSL + SFTP - saves ~2.5MB"

        # Samba file sharing (~1.5MB) - no USB on CR660x
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMBD36=y/CONFIG_FIRMWARE_INCLUDE_SMBD36=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMBD=y/CONFIG_FIRMWARE_INCLUDE_SMBD=n/' .config
        echo "  [OFF] SMBD/Samba - saves ~1.5MB"

        # TCPDUMP (~0.6MB) - network capture tool
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TCPDUMP=y/CONFIG_FIRMWARE_INCLUDE_TCPDUMP=n/' .config
        echo "  [OFF] TCPDUMP - saves ~0.6MB"

        # --- Medium plugins ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_XUPNPD=y/CONFIG_FIRMWARE_INCLUDE_XUPNPD=n/' .config
        echo "  [OFF] XUPNPD (IPTV)"

        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=y/CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=n/' .config
        echo "  [OFF] FFMPEG_NEW"

        # --- Download tools ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TRANSMISSION=y/CONFIG_FIRMWARE_INCLUDE_TRANSMISSION=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TRANSMISSION_WEB_CONTROL=y/CONFIG_FIRMWARE_INCLUDE_TRANSMISSION_WEB_CONTROL=n/' .config
        echo "  [OFF] Transmission (BitTorrent)"

        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ARIA=y/CONFIG_FIRMWARE_INCLUDE_ARIA=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ARIA_WEB_CONTROL=y/CONFIG_FIRMWARE_INCLUDE_ARIA_WEB_CONTROL=n/' .config
        echo "  [OFF] Aria2 (download manager)"

        # --- Ad blocking ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ADBYBY=y/CONFIG_FIRMWARE_INCLUDE_ADBYBY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y/CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y/CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=n/' .config
        echo "  [OFF] AdBlock plugins (ADBYBY/KOOLPROXY/AdGuard)"

        # --- Proxy/VPN ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSSERVER=y/CONFIG_FIRMWARE_INCLUDE_SSSERVER=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSOBFS=y/CONFIG_FIRMWARE_INCLUDE_SSOBFS=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_V2RAY=y/CONFIG_FIRMWARE_INCLUDE_V2RAY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TROJAN=y/CONFIG_FIRMWARE_INCLUDE_TROJAN=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_XRAY=y/CONFIG_FIRMWARE_INCLUDE_XRAY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_TUNSAFE=y/CONFIG_FIRMWARE_INCLUDE_TUNSAFE=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SSWAN=y/CONFIG_FIRMWARE_INCLUDE_SSWAN=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FRPC=y/CONFIG_FIRMWARE_INCLUDE_FRPC=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FRPS=y/CONFIG_FIRMWARE_INCLUDE_FRPS=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y/CONFIG_FIRMWARE_INCLUDE_ZEROTIER=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DDNSTO=y/CONFIG_FIRMWARE_INCLUDE_DDNSTO=n/' .config
        echo "  [OFF] Proxy/VPN plugins (SS/V2Ray/Trojan/XRay/FRP/ZeroTier)"

        # --- Campus network auth ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_MENTOHUST=y/CONFIG_FIRMWARE_INCLUDE_MENTOHUST=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=y/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_GDUT_DRCOM=y/CONFIG_FIRMWARE_INCLUDE_GDUT_DRCOM=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_MINIEAP=y/CONFIG_FIRMWARE_INCLUDE_MINIEAP=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_NJIT_CLIENT=y/CONFIG_FIRMWARE_INCLUDE_NJIT_CLIENT=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DOGCOM=y/CONFIG_FIRMWARE_INCLUDE_DOGCOM=n/' .config
        echo "  [OFF] Campus network auth plugins"

        # --- Misc small plugins ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_VLMCSD=y/CONFIG_FIRMWARE_INCLUDE_VLMCSD=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_NAPT66=y/CONFIG_FIRMWARE_INCLUDE_NAPT66=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_IPERF3=y/CONFIG_FIRMWARE_INCLUDE_IPERF3=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOCAT=y/CONFIG_FIRMWARE_INCLUDE_SOCAT=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER=y/CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SRELAY=y/CONFIG_FIRMWARE_INCLUDE_SRELAY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_LRZSZ=y/CONFIG_FIRMWARE_INCLUDE_LRZSZ=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_CADDY=y/CONFIG_FIRMWARE_INCLUDE_CADDY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_CADDYBIN=y/CONFIG_FIRMWARE_INCLUDE_CADDYBIN=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_WYY=y/CONFIG_FIRMWARE_INCLUDE_WYY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_WYYBIN=y/CONFIG_FIRMWARE_INCLUDE_WYYBIN=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ALDRIVER=y/CONFIG_FIRMWARE_INCLUDE_ALDRIVER=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y/CONFIG_FIRMWARE_INCLUDE_ALIDDNS=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_MINIDLNA=y/CONFIG_FIRMWARE_INCLUDE_MINIDLNA=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_FIREFLY=y/CONFIG_FIRMWARE_INCLUDE_FIREFLY=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DUMP1090=y/CONFIG_FIRMWARE_INCLUDE_DUMP1090=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_RTL_SDR=y/CONFIG_FIRMWARE_INCLUDE_RTL_SDR=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_NTFS_3G=y/CONFIG_FIRMWARE_INCLUDE_NTFS_3G=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_DROPBEAR=y/CONFIG_FIRMWARE_INCLUDE_DROPBEAR=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y/CONFIG_FIRMWARE_INCLUDE_SMARTDNS=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN=y/CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN=n/' .config
        echo "  [OFF] Misc plugins (VLMCSD/NAPT66/IPERF3/SOCAT/etc)"

        # --- SoftEther VPN ---
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_SERVER=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_SERVER=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CLIENT=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CLIENT=n/' .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CMD=y/CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CMD=n/' .config
        echo "  [OFF] SoftEther VPN"

        # =====================================================
        # ENABLE: QoS for traffic shaping (speed stability)
        # =====================================================
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_QOS=n/CONFIG_FIRMWARE_INCLUDE_QOS=y/' .config
        echo "  [ON]  QoS - traffic shaping for speed stability"

        # =====================================================
        # KEEP THESE ENABLED (do NOT disable):
        # - SFE: hardware acceleration (essential for speed)
        # - WIFI_DRIVER 7.3.0.1: wireless driver (essential for apcli0)
        # - IPV6: IPv6 support (ISP compatibility)
        # - IPSET: firewall rules support
        # - LANG_CN: Chinese WebUI
        # - EAP_PEAP: enterprise WiFi auth
        # - OPENSSH: SSH access for management
        # - CURL: HTTP client
        # - TTYD: web terminal
        # - HTOP/NANO/MTR: small useful tools
        # - QOS: traffic shaping
        # =====================================================

        echo ""
        echo "============================================"
        echo "=== Changed entries (diff from original) ==="
        echo "============================================"
        diff configs/templates/$TNAME.config .config || true

        echo ""
        echo "============================================"
        echo "=== Final config: plugins still enabled (=y) ==="
        echo "============================================"
        grep "CONFIG_FIRMWARE_INCLUDE.*=y" .config | sort

        echo ""
        echo "=== Wireless config (must be intact) ==="
        grep -E "CONFIG_FIRMWARE_WIFI|CONFIG_FIRMWARE_ENABLE_IPV6|CONFIG_FIRMWARE_INCLUDE_SFE|CONFIG_FIRMWARE_INCLUDE_EAP" .config

    - name: Build firmware
      run: |
        cd /opt/rt-n56u/trunk
        sudo ./clear_tree
        sudo fakeroot ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/
        echo "=== Firmware built ==="
        ls -lh /opt/images/

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-CR660x-Custom-v4
        path: /opt/images

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-v4
        path: |
          /opt/rt-n56u/trunk/images/
          /opt/rt-n56u/trunk/.config
